[project]
name = "arxiv-digest"
version = "1.15.1"
description = "arXiv Atlas — an interactive citation/similarity graph explorer with an AI teacher that narrates a field's history over the graph."
requires-python = ">=3.11"
dependencies = [
    "flask>=3.0",
    "flask-cors>=4.0",
    "anthropic>=0.40",
    "arxiv>=2.1",
    "python-dotenv>=1.0",
    "sentence-transformers>=3.0",
    "sqlite-vec>=0.1.6",
    "pymupdf>=1.24",
    "click>=8.1",
]

[tool.uv]
package = false

[dependency-groups]
dev = []

# Pre-commit hooks for arXiv Atlas — run via `uv run nox` (the `precommit`
# session) or directly with `pre-commit run --all-files`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # The frontend's tsconfig files are JSONC (comments + trailing commas),
        # which a strict JSON parser rejects — exclude them.
        exclude: ^frontend/tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        # Keeps the default 500 KB guard everywhere except the one file that has
        # earned an exemption: the landmark-threshold fitting corpus (~6 MB
        # gzipped, from 67 MB). It is committed so the fit reproduces off the
        # corpus machine, and it can't be shrunk further without throwing away
        # sample density the 20–40 band question needs — see that package's
        # README ("Why the corpus is gzipped").
        exclude: ^src/ml_pipelines/landmark_threshold/corpus_s2\.csv\.gz$
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Python lint (config lives in pyproject.toml's [tool.ruff]).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]

  # The CLAUDE.md naming convention, mechanized: no single-letter identifiers
  # (`_` as a pure discard excepted), in notebooks as well as modules — ruff
  # has no minimum-name-length rule (E741 only bans l/I/O), so this is a small
  # AST walker of our own. See bin/check_identifiers.py's docstring.
  - repo: local
    hooks:
      - id: identifiers
        name: no single-letter identifiers
        language: system
        entry: uv run --no-sync python bin/check_identifiers.py
        types_or: [python, jupyter]

  # Docstring COMPLETENESS: every Args section matches the signature and a
  # Returns section exists wherever a value comes back (config in pyproject's
  # [tool.pydoclint]; ruff's D rules already enforce presence + format).
  # Runs in an ISOLATED, pinned uvx env — like ruff above, pydoclint is a tool,
  # not a project dependency. It must, because pydoclint pins
  # `docstring_parser_fork`, which ships the same `docstring_parser` import
  # package as the mainline `docstring-parser` that `anthropic` pulls in; with
  # both in one env the mainline shadows the fork and pydoclint fails to import
  # (`DocstringYields` missing). uvx gives it an env containing only the fork.
  - repo: local
    hooks:
      - id: pydoclint
        name: pydoclint (docstring completeness)
        language: system
        entry: uvx --from pydoclint==0.9.1 pydoclint src/atlas
        files: ^src/atlas/.*\.py$
        pass_filenames: false

  # Frontend format + lint — the same npm scripts you'd run by hand, over the
  # whole frontend (both tools are fast). They need frontend/node_modules;
  # the session-start bin/setup installs it. Prettier runs first and fixes in
  # place (the ruff --fix pattern): a reformat fails the run so the changes
  # get restaged, then oxlint judges the formatted code.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend format)
        language: system
        entry: npm run format --silent --prefix frontend
        files: ^frontend/(src/.*\.(ts|tsx|css)|vite\.config\.ts)$
        pass_filenames: false
      - id: oxlint
        name: oxlint (frontend lint)
        language: system
        entry: npm run lint --silent --prefix frontend
        files: ^frontend/(src/.*\.(ts|tsx|css)|vite\.config\.ts)$
        pass_filenames: false
